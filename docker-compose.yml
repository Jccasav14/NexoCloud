version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nexocloud_db
    environment:
      POSTGRES_USER: nexo_user
      POSTGRES_PASSWORD: nexo_password
      POSTGRES_DB: nexocloud_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexocloud_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://nexo_user:nexo_password@db:5432/nexocloud_db
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexocloud_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
